name: care_tuition stale check

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare data_year vs current year
        id: check
        shell: bash
        run: |
          set -e
          DATA_YEAR=$(python -c "import json; print(json.load(open('custom_components/kr_baby_kit/data/care_tuition_kr.json'))['_meta']['data_year'])")
          CURRENT_YEAR=$(date -u +%Y)
          echo "data_year=$DATA_YEAR" >> "$GITHUB_OUTPUT"
          echo "current_year=$CURRENT_YEAR" >> "$GITHUB_OUTPUT"
          if [ "$DATA_YEAR" -lt "$CURRENT_YEAR" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create stale-data issue (idempotent)
        if: steps.check.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATA_YEAR: ${{ steps.check.outputs.data_year }}
          CURRENT_YEAR: ${{ steps.check.outputs.current_year }}
        run: |
          set -e
          EXISTING=$(gh issue list --label data-stale --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "data-stale issue already open; skipping."
            exit 0
          fi
          gh label create data-stale --color FBCA04 --description "care_tuition data_year behind current year" 2>/dev/null || true
          gh issue create \
            --title "보육료 데이터 갱신 필요 — data_year=${DATA_YEAR} < ${CURRENT_YEAR}" \
            --label data-stale \
            --body "$(cat <<EOF
\`custom_components/kr_baby_kit/data/care_tuition_kr.json\` 의 \`_meta.data_year\` 가
**${DATA_YEAR}** 인데 현재 연도는 **${CURRENT_YEAR}** 입니다.

교육부 「${CURRENT_YEAR}년도 보육사업안내」가 발표됐는지 확인하고
\`docs/release-checklist.md\` §2 절차로 갱신해주세요.

### 출처 후보 (안정성 순)

1. KDI 경제정책정보센터 — https://eiec.kdi.re.kr/policy/materialView.do
2. 교육부 누리집 — https://www.moe.go.kr/boardCnts/viewRenew.do?boardID=312
3. 중앙육아종합지원센터 — https://central.childcare.go.kr/ccef/community/data/DataSlPL.jsp?BBSGB=385

### 빠른 점검

\`\`\`bash
python scripts/check_care_tuition.py --strict
python -m pytest tests/test_care_tuition.py
\`\`\`

자동 알림: \`.github/workflows/care_tuition_stale_check.yml\` 매월 1일 실행.
이슈를 닫으려면 데이터 갱신 후 PR 머지 또는 수동 close.
EOF
)"
