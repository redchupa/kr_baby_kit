name: care_tuition stale check

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare data_year vs current year
        id: check
        shell: bash
        run: |
          set -e
          DATA_YEAR=$(python -c "import json; print(json.load(open('custom_components/kr_baby_kit/data/care_tuition_kr.json'))['_meta']['data_year'])")
          CURRENT_YEAR=$(date -u +%Y)
          echo "data_year=$DATA_YEAR" >> "$GITHUB_OUTPUT"
          echo "current_year=$CURRENT_YEAR" >> "$GITHUB_OUTPUT"
          if [ "$DATA_YEAR" -lt "$CURRENT_YEAR" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create stale-data issue (idempotent)
        if: steps.check.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATA_YEAR: ${{ steps.check.outputs.data_year }}
          CURRENT_YEAR: ${{ steps.check.outputs.current_year }}
        shell: bash
        run: |
          set -e
          EXISTING=$(gh issue list --label data-stale --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "data-stale issue already open; skipping."
            exit 0
          fi
          gh label create data-stale --color FBCA04 --description "care_tuition data_year behind current year" 2>/dev/null || true
          # Render the issue body template with env-var substitution; keeps the
          # workflow YAML free of heredoc indentation hazards.
          envsubst < .github/issue-bodies/care_tuition_stale.md > "$RUNNER_TEMP/body.md"
          gh issue create \
            --title "보육료 데이터 갱신 필요 — data_year=${DATA_YEAR} < ${CURRENT_YEAR}" \
            --label data-stale \
            --body-file "$RUNNER_TEMP/body.md"
