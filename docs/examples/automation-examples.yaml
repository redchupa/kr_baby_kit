#      예정된 일정 없음
#      {% endif %}

# 6. 매월 25일 아침: 다음 달 보육료 본인부담금 알림
#    placeholder 상태(미갱신)일 때는 알림이 발송되지 않습니다 — sensor가
#    Unknown(None)이므로 numeric_state 트리거가 작동하지 않음.
- alias: 보육료 본인부담금 월말 알림
  trigger:
    - platform: time
      at: "08:00:00"
  condition:
    - condition: template
      value_template: "{{ now().day == 25 }}"
    - condition: template
      value_template: >-
        {{ states('sensor.kr_baby_kit_baby_a_보육료_본인부담금') not in ('unknown','unavailable','') }}
  action:
    - service: notify.mobile_app
      data:
        title: "다음 달 보육료 본인부담금"
        message: >-
          {% set parent = states('sensor.kr_baby_kit_baby_a_보육료_본인부담금') | int(0) %}
          {% set tier = state_attr('sensor.kr_baby_kit_baby_a_보육료_본인부담금', 'age_class_label_ko') %}
          {{ tier }} 본인부담금 약 {{ '{:,}'.format(parent) }}원. 정확한 금액은 어린이집에서 확인하세요.

# 7. 보육료 데이터가 placeholder인 채로 두면 매주 월요일 알림
#    (개발자/유지보수용 — 정식 사용 전 JSON 갱신을 잊지 않도록)
- alias: 보육료 데이터 미갱신 경고
  trigger:
    - platform: time
      at: "10:00:00"
  condition:
    - condition: time
      weekday: [mon]
    - condition: template
      value_template: >-
        {{ state_attr('sensor.kr_baby_kit_baby_a_표준보육료', 'is_placeholder') == true }}
  action:
    - service: persistent_notification.create
      data:
        title: "kr_baby_kit: 보육료 데이터 미갱신"
        message: >-
          custom_components/kr_baby_kit/data/care_tuition_kr.json 이
          placeholder 상태입니다. 보건복지부 표준보육료 고시로 갱신 후
          HA를 재시작하세요. 자세한 절차는 docs/release-checklist.md 참고.
